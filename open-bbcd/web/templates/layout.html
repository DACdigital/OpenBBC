{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>open-bbcd</title>
  <script src="/static/htmx.min.js"></script>
  <script src="/static/drawflow.min.js"></script>
  <script src="/static/dagre.min.js"></script>
  <script defer src="/static/openbbc-flow.js"></script>
  <script defer src="/static/chip-input.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1f29;color:#f0f6fc;height:100vh;display:flex}
    .sidebar{width:220px;background:#131820;border-right:1px solid #2d333b;padding:28px 0;flex-shrink:0;display:flex;flex-direction:column;gap:2px}
    .sidebar-logo{color:#79c0ff;font-weight:700;font-size:24px;letter-spacing:-0.01em;padding:0 22px;margin-bottom:28px;display:block}
    .nav-link{display:block;padding:12px 22px;font-size:15px;font-weight:500;text-decoration:none;color:#a8b3c1;border-left:3px solid transparent;transition:color .12s,background .12s}
    .nav-link:hover{color:#f0f6fc;background:#1c2230}
    .nav-link.active{color:#56d364;border-left-color:#56d364;background:#162320}
    .nav-link.disabled{color:#4f5a66;cursor:default;pointer-events:none}
    .content{flex:1;padding:28px 32px;overflow-y:auto;max-width:960px}
    /* Wide pages (lists, configurator) opt out of the narrow centred column. */
    .content:has(.data-table), .content:has(.config-page){max-width:none}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .page-header h1{font-size:22px;font-weight:600;letter-spacing:-0.01em}
    .btn-primary{background:#2ea043;color:#fff;border:none;padding:9px 18px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;box-shadow:0 1px 0 rgba(27,31,36,.1),inset 0 1px 0 rgba(255,255,255,.03)}
    .btn-primary:hover{background:#3fb950}
    .btn-secondary{background:#21262d;color:#e6edf3;border:1px solid #444c56;padding:9px 18px;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block}
    .btn-secondary:hover{background:#2d333b;border-color:#6e7681}
    .data-table{width:100%;border-collapse:collapse;border:1px solid #2d333b;border-radius:8px;overflow:hidden}
    .data-table th{background:#1c2230;padding:12px 18px;font-size:12px;color:#a8b3c1;text-align:left;font-weight:600;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #2d333b}
    .data-table td{padding:14px 18px;font-size:14px;border-top:1px solid #262c36}
    .data-table tbody tr.clickable{cursor:pointer}
    .data-table tbody tr.clickable:hover{background:#1c2230}
    .col-version{width:60px;font-weight:600;color:#56d364}
    .col-version.old{color:#8b949e}
    .col-date{width:140px;color:#a8b3c1}
    .col-count{width:90px;color:#a8b3c1;text-align:right;font-variant-numeric:tabular-nums}
    .col-status{width:140px}
    .col-actions{width:140px;text-align:right}
    .btn-small{background:#21262d;color:#e6edf3;border:1px solid #444c56;padding:5px 12px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer}
    .btn-small:hover{background:#2d333b;border-color:#6e7681}
    .btn-small.btn-danger{background:#21130f;color:#f85149;border-color:#5f1a18}
    .btn-small.btn-danger:hover{background:#2d1418;border-color:#f85149}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000}
    .modal-content{background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:24px;min-width:380px;max-width:560px;box-shadow:0 16px 48px rgba(0,0,0,.5);color:#e6edf3;display:flex;flex-direction:column;gap:14px}
    .modal-content h2{font-size:16px;font-weight:600}
    .modal-content p{font-size:14px;line-height:1.4;color:#c9d1d9}
    .modal-content code{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:2px 6px;font-size:13px;color:#79c0ff}
    .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
    .modal-actions button{background:#21262d;color:#e6edf3;border:1px solid #444c56;padding:7px 14px;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer}
    .modal-actions button:hover{background:#2d333b;border-color:#6e7681}
    .modal-actions button:first-child{background:#1f6feb;border-color:#388bfd;color:#fff}
    .modal-actions button:first-child:hover{background:#388bfd}
    .agent-link{color:#f0f6fc;text-decoration:none;font-weight:600;font-size:15px}
    .agent-link:hover{color:#79c0ff;text-decoration:underline}
    /* Status pills: visible at a glance — dot indicator + filled background +
       stronger text contrast. */
    .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border:1px solid transparent}
    .badge::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor}
    .badge-deployed    {background:#0d2e16;border-color:#2ea043;color:#7ee787} /* green */
    .badge-ready       {background:#0a2a2c;border-color:#1f9499;color:#56d4d8} /* cyan */
    .badge-training    {background:#332405;border-color:#bb8009;color:#f9d050} /* amber */
    .badge-initializing{background:#221137;border-color:#8957e5;color:#c2a4ff} /* violet */
    .badge-draft       {background:#252a31;border-color:#6e7681;color:#d0d7de} /* neutral */
    .empty-state{color:#8b949e;font-size:14px;padding:40px 0;text-align:center}
    .wizard-back{font-size:13px;color:#8b949e;text-decoration:none;display:inline-block;margin-bottom:14px}
    .wizard-back:hover{color:#e6edf3}
    .wizard-title{font-size:18px;font-weight:600;margin-bottom:20px}
    .progress{display:flex;align-items:center;margin-bottom:28px}
    .step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:#2d333b;color:#a8b3c1;flex-shrink:0;border:1px solid #444c56}
    .step-dot.active{background:#1f6feb;color:#fff;border-color:#388bfd;box-shadow:0 0 0 4px rgba(56,139,253,.25)}
    .step-dot.done{background:#2ea043;color:#fff;border-color:#3fb950}
    .step-line{flex:1;height:2px;background:#30363d}
    .step-line.done{background:#238636}
    .step-label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .step-question{font-size:16px;font-weight:500;margin-bottom:16px}
    .field-input{width:100%;background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:10px 12px;font-size:14px;font-family:inherit;resize:vertical;outline:none}
    .field-input:focus{border-color:#388bfd}
    .field-file-wrap{background:#0d1117;border:2px dashed #30363d;border-radius:6px;padding:20px;text-align:center;color:#8b949e}
    .field-file-wrap input{margin-top:8px}
    .wizard-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
    #form-body{min-height:200px}
    .page-header-actions{display:flex;gap:8px;align-items:center}
    .agent-subtitle{color:#a8b3c1;font-size:14px;margin:-16px 0 24px 0}
    .agent-meta{display:flex;flex-wrap:wrap;gap:36px;margin:0 0 28px 0;padding-bottom:20px;border-bottom:1px solid #2d333b}
    .agent-meta-item dt{font-size:11px;color:#a8b3c1;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:600}
    .agent-meta-item dd{margin:0;font-size:14px;color:#f0f6fc}
    .agent-meta-item code{background:#1c2230;padding:2px 8px;border-radius:4px;color:#c2a4ff;font-size:13px}
    .agent-meta-item a{color:#79c0ff;text-decoration:none}
    .agent-meta-item a:hover{text-decoration:underline}
    .section-title{margin:8px 0 12px 0;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#a8b3c1;font-weight:600}
    .pagination{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:18px;padding-top:14px;border-top:1px solid #21262d}
    .pagination-link{color:#a8b3c1;text-decoration:none;font-size:13px;padding:6px 10px;border-radius:5px;border:1px solid #2d333b}
    .pagination-link:hover{color:#e6edf3;background:#1c2230}
    .pagination-link.disabled{opacity:.4;pointer-events:none}
    .pagination-summary{color:#8b949e;font-size:13px;font-variant-numeric:tabular-nums}
  </style>
  <link rel="stylesheet" href="/static/drawflow.min.css">
  <link rel="stylesheet" href="/static/configurator.css">
  <script>
    function requireCurrentField(event) {
      const field = document.querySelector('#form-body input:not([type=hidden]), #form-body textarea, #form-body input[type=file]');
      if (field && !field.checkValidity()) {
        field.reportValidity();
        event.preventDefault();
      }
    }
  </script>
</head>
<body>
  <nav class="sidebar">
    <span class="sidebar-logo">open-bbcd</span>
    <a href="/agents/ui" class="nav-link {{if eq .Active "agents"}}active{{end}}">Agents</a>
    <a href="/mcp" class="nav-link {{if eq .Active "mcp"}}active{{end}}">MCP</a>
    <span class="nav-link disabled">Datasets</span>
    <span class="nav-link disabled">Scores</span>
    <span class="nav-link disabled">Resources</span>
  </nav>
  <main class="content">
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}
