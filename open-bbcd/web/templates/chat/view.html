{{define "content"}}
<div class="page-header">
  <div>
    <a href="/agents/{{.AgentID}}/chat" class="back-link">← Sessions</a>
    <h1>{{.AgentName}}</h1>
  </div>
</div>

<div id="chat-log" class="chat-log" data-agent-id="{{.AgentID}}" data-session-id="{{.SessionID}}">
  {{range .Messages}}
    <div class="chat-bubble {{.Role}}">
      <div class="role-label">[{{.Role}}]</div>
      <div class="content">
        <pre class="raw-content">{{printf "%s" .Content}}</pre>
      </div>
    </div>
  {{else}}
    <p class="empty-state">No messages yet — type below to start.</p>
  {{end}}
</div>

<form id="chat-form" class="chat-input" onsubmit="return false;">
  <textarea id="chat-input" placeholder="Type a message…  (Cmd/Ctrl+Enter to send)" rows="2"{{if not .HasBundle}} disabled{{end}}></textarea>
  <button type="submit" id="chat-send" class="btn-primary"{{if not .HasBundle}} disabled title="Agent has no bundle"{{end}}>Send</button>
</form>

<link rel="stylesheet" href="/static/chat.css">
<script src="/static/chat.js" defer></script>
{{end}}
