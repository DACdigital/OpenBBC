services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: openbbcd
      POSTGRES_PASSWORD: openbbcd
      POSTGRES_DB: openbbcd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbbcd"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
