version: v1

main_prompt:
  - name: role
    tag: role
    source: llm_synthesized
    required: true
    guidance: "One-sentence statement of who the agent is, derived from business_domain and name."
  - name: scope
    tag: scope
    source: wizard_copied
    source_field: scope
    required: true
  - name: personality
    tag: personality
    source: llm_synthesized
    required: true
    guidance: "Tone and style appropriate for business_domain. 1-3 sentences."
  - name: business_domain
    tag: business_domain
    source: wizard_copied
    source_field: business_domain
    required: true
  - name: should_do
    tag: should_do
    source: wizard_copied
    source_field: should_do
    required: true
  - name: should_not_do
    tag: should_not_do
    source: wizard_copied
    source_field: should_not_do
    required: true
  - name: guardrails
    tag: guardrails
    source: llm_synthesized
    required: true
    guidance: "Expanded restatement of should_not_do plus inferred safety rules."
  - name: skills_index
    tag: skills_index
    source: config_derived
    required: true
    guidance: "Bulleted index of internal skills with role + one-line description."
  - name: external_actions
    tag: external_actions
    source: config_derived
    required: false
    guidance: "Bulleted list of external skills the agent must redirect the user to."

skill_prompt:
  - name: role
    tag: role
    source: llm_synthesized
    required: true
    guidance: "Statement of what this skill is responsible for."
  - name: objective
    tag: objective
    source: llm_synthesized
    required: true
    guidance: "Concrete outcome the skill must achieve."
  - name: resources
    tag: resources
    source: llm_synthesized
    required: true
    guidance: "Describe the linked capability as an MCP server. Name = proposed_tool. 1-2 sentence purpose statement. No HTTP detail."
  - name: guardrails
    tag: guardrails
    source: llm_synthesized
    required: true
    guidance: "Skill-specific guardrails consistent with main prompt guardrails."
  - name: examples
    tag: examples
    source: llm_synthesized
    required: true
    guidance: "2-3 short example exchanges showing correct skill usage."
