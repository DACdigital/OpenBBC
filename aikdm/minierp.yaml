  prose_md: "# Update profile\n\n<!-- AGENT id=\"prose\" -->\nThe user opens their\
    \ profile page. On mount, the agent reads the\ncurrent record so the form can\
    \ be pre-filled. The user may edit one\nor both of name and email, then submit\
    \ to persist the change. The\nread is mount-time and unconditional; the write\
    \ only fires on form\nsubmit and is partial — only the user's intent gets sent.\n\
    <!-- /AGENT -->\n\n## Entry point\n\n`src/pages/Profile.tsx` — reached when the\
    \ user navigates to\n`/profile` (mounted by the react-router-dom route in `src/App.tsx`).\n\
    \n## How the agent handles this\n\n1. On mount, perform [read user profile](../skills/read-user-profile.md)\n\
    \   so the agent knows the current `name` and `email`.\n2. Confirm which field(s)\
    \ the user wants to change and the new\n   value(s). If the user did not provide\
    \ one, ask before writing.\n3. Perform [write user profile](../skills/write-user-profile.md)\
    \ with\n   only the fields the user changed.\n4. On success, summarise the change\
    \ back to the user.\n5. On failure, surface the error and offer to retry once.\n\
    \n## Decision points\n\n- **User did not provide a new value** → ask for it before\
    \ the write skill.\n- **User asked to change a field this surface does not accept**\n\
    \  (e.g. password) → tell the user that field cannot be changed here.\n- **Two\
    \ retries failed** → stop retrying and ask the user whether to\n  surface a support\
    \ request.\n\n## Sequence\n\n```mermaid\nsequenceDiagram\n  actor User\n  participant\
    \ Agent\n  participant T as MCP tools\n\n  User->>Agent: \"open my profile\"\n\
    \  Agent->>T: read user profile\n  T-->>Agent: current name and email\n  Agent->>User:\
    \ shows current values\n  User->>Agent: \"change my name to Sam\"\n  Agent->>T:\
    \ write user profile\n  T-->>Agent: updated record\n  Agent->>User: confirms outcome\n\
    ```\n\n## Failure modes\n\n| What happens | What it means | What to do |\n|---|---|---|\n\
    | read-user-profile returns 401 | Bearer token missing or expired | Ask the user\
    \ to sign in again |\n| write-user-profile returns 401 | Same as above | Ask the\
    \ user to sign in again |\n| write-user-profile returns 422 | Validation failed\
    \ (e.g., bad email) | Echo the error and ask for a fix |\n| Any tool returns 5xx\
    \ | Backend transient failure | Retry once with backoff, then surface |\n\n##\
    \ Skills used\n\n- [read user profile](../skills/read-user-profile.md) — read\n\
    - [write user profile](../skills/write-user-profile.md) — write\n\n<!-- HUMAN\
    \ id=\"extra\" -->\n<!-- /HUMAN -->\n\n## Unresolved\n\nNone.\n"
