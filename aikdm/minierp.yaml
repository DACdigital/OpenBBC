  - what name do you have for me
  role: read
  capability_ref: users
  external: false
  proposed_tool: users.getMe
  prose_md: "# Read user profile\n\n<!-- AGENT id=\"overview\" -->\nRead the acting\
    \ user's own profile record. The path uses the\nliteral alias `me`, so the agent\
    \ never has to supply a user id —\nthe bearer token resolves identity server-side.\
    \ Also called as the\nmount-time read on the profile page so the edit form can\
    \ pre-fill.\n<!-- /AGENT -->\n\n## When to use\n\nThe user is asking what data\
    \ the account currently holds, or the\nagent needs to pre-fill an edit form before\
    \ offering a change.\nAlways pair with the write skill when the user has stated\
    \ an\nintent to change a field.\n\nTrigger phrases:\n- \"who am I signed in as\"\
    \n- \"show my profile\"\n- \"what's my email on file\"\n- \"what name do you have\
    \ for me\"\n\n## Preconditions\n\n1. User is signed in (a bearer token is present\
    \ in client-side storage).\n\n## Flows that surface this skill\n\n- [update-profile](../flows/update-profile.md)\
    \ — surfaced on\n  profile-page mount to pre-fill the edit form.\n\n## Failure\
    \ modes\n\n| Result | Meaning | What to do |\n|---|---|---|\n| 401 | Bearer token\
    \ missing or expired | Ask the user to sign in again |\n| 5xx | Backend transient\
    \ failure | Retry once with backoff, then surface |\n\n## Examples\n\n**1.** User\
    \ says: *\"what email do you have for me?\"*\n\nExpected tool call shape (proposed\
    \ — exact arguments depend on the\nfinal MCP server):\n\n```\nusers.getMe()\n\
    ```\n\n**2.** User says: *\"who am I signed in as?\"*\n\nExpected tool call shape:\n\
    \n```\nusers.getMe()\n// then return the `name` and `email` fields\n```\n\n<!--\
    \ HUMAN id=\"notes\" -->\n<!-- /HUMAN -->\n"
- id: write-user-profile
  origin: discovered
  name: Write user profile
  description: Use when the user wants to change their account name or email
  user_phrases:
  - change my name
  - update my email
  - fix my profile
  - my email is wrong
  role: write
  capability_ref: users
  external: false
  proposed_tool: users.updateMe
  prose_md: "# Write user profile\n\n<!-- AGENT id=\"overview\" -->\nPersist the acting\
    \ user's edited profile fields (`name`, `email`)\nto the backend. Partial update:\
    \ the agent sends only the fields the\nuser actually changed. There is no create\
    \ or delete surface here —\nthis is the single write verb on the user record in\
    \ v0.\n<!-- /AGENT -->\n\n## When to use\n\nThe user has stated a change to one\
    \ or both of their account\nfields and wants that change persisted. Pair with\
    \ the read skill\nfirst if the agent does not already know the current value.\n\
    \nTrigger phrases:\n- \"change my name to X\"\n- \"update my email to Y\"\n- \"\
    fix my profile\"\n- \"my email is wrong\"\n\n## Preconditions\n\n1. User is signed\
    \ in (a bearer token is present in client-side storage).\n2. The user has supplied\
    \ at least one new field value to write.\n3. The acting user is updating their\
    \ own record (the `me` alias\n   makes any cross-user write structurally impossible).\n\
    \n## Flows that surface this skill\n\n- [update-profile](../flows/update-profile.md)\
    \ — triggered by the\n  profile-page form submit.\n\n## Failure modes\n\n| Result\
    \ | Meaning | What to do |\n|---|---|---|\n| 401 | Bearer token missing or expired\
    \ | Ask the user to sign in again |\n| 422 | Validation failed (e.g., malformed\
    \ email) | Echo the error and ask for a fix |\n| 5xx | Backend transient failure\
    \ | Retry once with backoff, then surface |\n\n## Examples\n\n**1.** User says:\
    \ *\"change my name to Sam\"*\n\nExpected tool call shape (proposed — exact arguments\
    \ depend on the\nfinal MCP server):\n\n```\nusers.updateMe({ name: \"Sam\" })\n\
    ```\n\n**2.** User says: *\"my email is wrong, it's actually sam@example.com\"\
    *\n\nExpected tool call shape:\n\n```\nusers.updateMe({ email: \"sam@example.com\"\
    \ })\n```\n\n<!-- HUMAN id=\"notes\" -->\n<!-- /HUMAN -->\n"
flows:
- id: browse-products
  origin: discovered
  included: true
  name: Browse products
  description: Use when the user wants to see the catalog and optionally add items
    to their cart
  intent: Surface the product catalog and let the user stage items locally for a future
    purchase
  user_phrases:
  - show me what's for sale
  - what do you have
  - I want to look at the catalog
  - add this to my cart
  preconditions:
  - User is signed in (a bearer token is present in client-side storage)
  postconditions:
  - User has seen the product list with name, price, category, and stock
  - Optionally, the local cart has one or more product entries staged in localStorage
  side_effects:
  - localStorage.cart
  confidence: high
  workflow:
    mermaid: "flowchart TD\n  start([start])\n  s_list_catalog[list-catalog]\n  e([end])\n\
      \  s_place_order[place-order]\n  start --> s_place_order\n  s_list_catalog -->\
      \ e\n  s_place_order --> s_list_catalog\n"
  prose_md: "# Browse products\n\n<!-- AGENT id=\"prose\" -->\nThe user lands on the\
    \ products page (either via the home redirect or the\n`/products` link). The agent's\
    \ job is to surface the catalog, help the\nuser pick what they want, and stage\
    \ chosen items into the browser-local\ncart. The cart write is intentionally local\
    \ — placing the order is a\nseparate flow off a separate page.\n<!-- /AGENT -->\n\
    \n## Entry point\n\n`src/pages/Products.tsx` — reached when the user navigates\
    \ to `/products`\nor `/` (both mount the same component via the react-router-dom\
    \ routes\ndeclared in `src/App.tsx`).\n\n## How the agent handles this\n\n1. On\
    \ mount, perform [list catalog](../skills/list-catalog.md) and\n   surface the\
    \ resulting product list to the user.\n2. If the user names a product or a property\
    \ (\"the cheapest one\", \"the\n   blue mug\"), filter the response client-side\
    \ and confirm the match\n   before adding.\n3. When the user asks to add an item\
    \ to their cart, append (or\n   increment) the local cart entry — this is a browser-local\n\
    \   write, not a backend call.\n4. Tell the user it has been added and offer to\
    \ continue browsing or\n   navigate to the cart.\n\n## Decision points\n\n- **The\
    \ user names a product the catalog does not contain** → tell\n  them it is not\
    \ available and offer a similar item from the response.\n- **The user wants to\
    \ remove or change quantity** → that surface is\n  not currently exposed in the\
    \ UI; tell them they can manage it on\n  the cart page (no skill maps here).\n\
    - **The catalog is empty** → tell the user the store has no products\n  and stop.\n\
    \n## Sequence\n\n```mermaid\nsequenceDiagram\n  actor User\n  participant Agent\n\
    \  participant T as MCP tools\n\n  User->>Agent: \"show me what's for sale\"\n\
    \  Agent->>T: list catalog\n  T-->>Agent: product list\n  Agent->>User: summarises\
    \ catalog\n  User->>Agent: \"add the blue mug\"\n  Agent->>User: confirms it has\
    \ been staged locally\n```\n\n## Failure modes\n\n| What happens | What it means\
    \ | What to do |\n|---|---|---|\n| Tool returns 401 | Bearer token missing or\
    \ expired | Ask the user to sign in again |\n| Tool returns 5xx | Backend transient\
    \ failure | Retry once with backoff, then surface |\n| Tool returns an empty list\
    \ | Catalog has no products | Tell the user the store is currently empty |\n\n\
    ## Skills used\n\n- [list catalog](../skills/list-catalog.md) — read\n\n<!-- HUMAN\
    \ id=\"extra\" -->\n<!-- /HUMAN -->\n\n## Unresolved\n\nNone.\n"
