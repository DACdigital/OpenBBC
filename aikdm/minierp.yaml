capabilities:
- name: orders
  summary: Read the acting user's past orders and place a new one
  tools:
  - auth: bearer
    confidence: high
    does: List the acting user's past orders
    method: GET
    path: /api/orders
    proposed: true
    source: src/api/orders.ts:24
    tool: orders.list
  - auth: bearer
    confidence: high
    does: Place a new order from a list of cart items
    method: POST
    path: /api/orders
    proposed: true
    source: src/api/orders.ts:32
    tool: orders.create
  prose_md: "# Orders\n\n<!-- AGENT id=\"overview\" -->\nThe `orders` capability covers\
    \ reading the acting user's past orders\nand creating new ones. Orders are user-scoped:\
    \ the bearer token\ndetermines whose orders are listed and who owns a newly created\n\
    order. Each order carries an `id`, `userId`, `items` (a list of\n`{ productId,\
    \ quantity }`), `total`, `status`, and `createdAt`. The\nbackend computes `total`,\
    \ `status`, and `createdAt` — the frontend\nnever sends them.\n<!-- /AGENT -->\n\
    \n## Concepts the agent must know\n\n- An order is owned by exactly one user (`userId`),\
    \ inferred\n  server-side from the bearer token.\n- An order's `items[]` is a\
    \ list of `{ productId, quantity }`\n  references into the `products` capability.\n\
    - The frontend submits only the `items[]` array on create; everything\n  else\
    \ (`total`, `status`, `createdAt`, `id`, `userId`) is filled by\n  the backend.\n\
    - The frontend does not expose order cancellation, update, or\n  refund — only\
    \ list and create.\n\n## When to reach for which tool\n\n- \"show my past orders\"\
    \ → `orders.list`\n- \"what did I order last week\" → `orders.list`\n- \"place\
    \ this order\" → `orders.create`\n- \"buy the things in my cart\" → `orders.create`\n\
    \n---\n\n## orders.list  {#orders-list}\n\n**Proposed tool name:** `orders.list`\
    \ (proposed — no MCP server yet)\n**HTTP:** `GET /api/orders`\n**Auth:** bearer\n\
    **Confidence:** high\n**Source:** `src/api/orders.ts:24`\n\n**Path params:** none\n\
    **Query params:** none\n**Body shape:** none (GET)\n**Response shape:** `Array<{\
    \ id: string, userId: string, items: Array<{ productId: string, quantity: number\
    \ }>, total: number, status: string, createdAt: string }>`\n\n**When to call it:**\n\
    - \"show my past orders\"\n- \"what's my order history\"\n- \"did my last order\
    \ go through\"\n\n**Used by flows:** [checkout](../flows/checkout.md)\n\n---\n\
    \n## orders.create  {#orders-create}\n\n**Proposed tool name:** `orders.create`\
    \ (proposed — no MCP server yet)\n**HTTP:** `POST /api/orders`\n**Auth:** bearer\n\
    **Confidence:** high\n**Source:** `src/api/orders.ts:32`\n\n**Path params:** none\n\
    **Query params:** none\n**Body shape:** `{ items: Array<{ productId: string, quantity:\
    \ number }> }`\n**Response shape:** `{ id: string, userId: string, items: Array<{\
    \ productId: string, quantity: number }>, total: number, status: string, createdAt:\
    \ string }`\n\n**When to call it:**\n- \"place the order\"\n- \"check out my cart\"\
    \n- \"buy these items\"\n\n**Used by flows:** [checkout](../flows/checkout.md)\n\
    \n---\n\n## Things this capability cannot do\n\n- Cannot cancel, update, or refund\
    \ an order — there is no tool\n  surface for those verbs in v0.\n- Cannot read\
    \ or write another user's orders; the server enforces\n  user scoping via the\
    \ bearer token.\n- Cannot list orders with filters (status, date range, etc.)\
    \ — the\n  agent must filter client-side after `orders.list`.\n\n<!-- HUMAN id=\"\
    notes\" -->\n<!-- /HUMAN -->\n"
- name: products
  summary: Read the product catalog the storefront displays
  tools:
  - auth: bearer
    confidence: high
    does: List every product in the catalog
    method: GET
    path: /api/products
    proposed: true
    source: src/api/products.ts:14
    tool: products.list
  prose_md: "# Products\n\n<!-- AGENT id=\"overview\" -->\nThe `products` capability\
    \ is the read-only catalog surface. Every product\ncarries an `id`, `name`, `price`,\
    \ `category`, and `stock` count. The\nstorefront treats the list as the source\
    \ of truth for what can be added\nto a cart — there is no client-side filtering\
    \ of category or stock. The\ncatalog is small enough that the only access pattern\
    \ in v0 is \"fetch\nthem all\" — there is no pagination, search, or filter parameter.\n\
    <!-- /AGENT -->\n\n## Concepts the agent must know\n\n- A product is identified\
    \ by its string `id`. Cart entries reference\n  products by that id.\n- `stock`\
    \ is an integer count of remaining units. The frontend does\n  not gate add-to-cart\
    \ on stock; the order placement endpoint is the\n  authoritative stock check.\n\
    - All requests are authenticated with a bearer token; missing or\n  expired tokens\
    \ produce 401 even on a read.\n\n## When to reach for which tool\n\n- \"show me\
    \ what's for sale\" → `products.list`\n- \"what's in the catalog\" → `products.list`\n\
    - \"list the products\" → `products.list`\n\n---\n\n## products.list  {#products-list}\n\
    \n**Proposed tool name:** `products.list` (proposed — no MCP server yet)\n**HTTP:**\
    \ `GET /api/products`\n**Auth:** bearer\n**Confidence:** high\n**Source:** `src/api/products.ts:14`\n\
    \n**Path params:** none\n**Query params:** none\n**Body shape:** none (GET)\n\
    **Response shape:** `Array<{ id: string, name: string, price: number, category:\
    \ string, stock: number }>`\n\n**When to call it:**\n- \"show me what's for sale\"\
    \n- \"list the products\"\n- \"what categories do you have\"\n\n**Used by flows:**\
    \ [browse-products](../flows/browse-products.md), [checkout](../flows/checkout.md)\n\
    \n---\n\n## Things this capability cannot do\n\n- Cannot fetch a single product\
    \ by id from this surface (the helper\n  exists in source but is not wired to\
    \ any UI).\n- Cannot search or filter by category, price, or stock — the agent\n\
    \  must filter the response client-side if needed.\n- Cannot create, update, or\
    \ delete products. The catalog is read-only\n  from the frontend's perspective.\n\
    \n<!-- HUMAN id=\"notes\" -->\n<!-- /HUMAN -->\n"
- name: users
  summary: Read and modify the acting user's own profile record
  tools:
  - auth: bearer
    confidence: high
    does: Read the acting user's profile
    method: GET
    path: /api/users/me
    proposed: true
    source: src/api/users.ts:17
    tool: users.getMe
  - auth: bearer
    confidence: high
    does: Update the acting user's name and/or email
    method: PATCH
    path: /api/users/me
    proposed: true
    source: src/api/users.ts:25
    tool: users.updateMe
  prose_md: "# Users\n\n<!-- AGENT id=\"overview\" -->\nThe `users` capability covers\
    \ the acting user's own profile record.\nThe path uses the literal alias `me`\
    \ rather than an id — the backend\nresolves \"self\" from the bearer token. There\
    \ is no surface for\nreading or writing another user's record from the frontend.\
    \ The\nrecord is small: `id`, `name`, `email`. Only `name` and `email` are\nwritable,\
    \ both optional on PATCH.\n<!-- /AGENT -->\n\n## Concepts the agent must know\n\
    \n- The path segment `me` is a literal alias for \"the acting user\".\n  The agent\
    \ does not need to supply a user id.\n- Authentication is required for both read\
    \ and write; a missing or\n  expired bearer token produces 401.\n- PATCH is partial:\
    \ send only the fields the user wants to change.\n  Sending an empty body returns\
    \ the current record unchanged.\n\n## When to reach for which tool\n\n- \"who\
    \ am I\" → `users.getMe`\n- \"show my profile\" → `users.getMe`\n- \"change my\
    \ name\" → `users.updateMe`\n- \"fix my email\" → `users.updateMe`\n\n---\n\n\
    ## users.getMe  {#users-get-me}\n\n**Proposed tool name:** `users.getMe` (proposed\
    \ — no MCP server yet)\n**HTTP:** `GET /api/users/me`\n**Auth:** bearer\n**Confidence:**\
    \ high\n**Source:** `src/api/users.ts:17`\n\n**Path params:** none\n**Query params:**\
    \ none\n**Body shape:** none (GET)\n**Response shape:** `{ id: string, name: string,\
    \ email: string }`\n\n**When to call it:**\n- \"who am I signed in as\"\n- \"\
    show my profile\"\n- \"what's my email on file\"\n\n**Used by flows:** [update-profile](../flows/update-profile.md)\n\
    \n---\n\n## users.updateMe  {#users-update-me}\n\n**Proposed tool name:** `users.updateMe`\
    \ (proposed — no MCP server yet)\n**HTTP:** `PATCH /api/users/me`\n**Auth:** bearer\n\
    **Confidence:** high\n**Source:** `src/api/users.ts:25`\n\n**Path params:** none\n\
    **Query params:** none\n**Body shape:** `{ name?: string, email?: string }`\n\
    **Response shape:** `{ id: string, name: string, email: string }`\n\n**When to\
    \ call it:**\n- \"change my name to X\"\n- \"update my email to Y\"\n- \"fix my\
    \ profile\"\n\n**Used by flows:** [update-profile](../flows/update-profile.md)\n\
    \n---\n\n## Things this capability cannot do\n\n- Cannot read or write another\
    \ user's record — there is no `id`\n  surface, only `me`.\n- Cannot change a password\
    \ or rotate credentials.\n- Cannot delete the account from this surface.\n\n<!--\
    \ HUMAN id=\"notes\" -->\n<!-- /HUMAN -->\n"
skills:
- id: list-catalog
  origin: discovered
  name: List catalog
  description: Use when the user wants to see what products are available to buy
  user_phrases:
  - show me what's for sale
  - list the products
  - what do you have
  - browse the catalog
  role: read
  capability_ref: products
  external: false
  proposed_tool: products.list
  prose_md: "# List catalog\n\n<!-- AGENT id=\"overview\" -->\nFetch the full product\
    \ catalog so the agent can surface what the user\ncan buy. This is a flat read\
    \ — no pagination, no filter, no search —\nand the agent applies any client-side\
    \ narrowing (by category, by\nprice, by name) over the returned list.\n<!-- /AGENT\
    \ -->\n\n## When to use\n\nThe user wants to know what products exist, or the\
    \ agent needs to\nresolve a product name or id before placing an order. Also called\n\
    during checkout so cart line items can be enriched with display\nnames and prices.\n\
    \nTrigger phrases:\n- \"show me what's for sale\"\n- \"list the products\"\n-\
    \ \"what do you have\"\n- \"browse the catalog\"\n\n## Preconditions\n\n1. User\
    \ is signed in (a bearer token is present in client-side storage).\n2. No prior\
    \ state is required — this can be the first call of a session.\n\n## Flows that\
    \ surface this skill\n\n- [browse-products](../flows/browse-products.md) — entry\
    \ from the\n  `/products` route on initial load.\n- [checkout](../flows/checkout.md)\
    \ — entry from the `/cart` route on\n  mount, so cart line items can be enriched\
    \ with product detail.\n\n## Failure modes\n\n| Result | Meaning | What to do\
    \ |\n|---|---|---|\n| 401 | Bearer token missing or expired | Ask the user to\
    \ sign in again |\n| 5xx | Backend transient failure | Retry once with backoff,\
    \ then surface |\n| Empty list | Catalog has no products | Tell the user the store\
    \ is currently empty |\n\n## Examples\n\n**1.** User says: *\"what do you sell?\"\
    *\n\nExpected tool call shape (proposed — exact arguments depend on the\nfinal\
    \ MCP server):\n\n```\nproducts.list()\n```\n\n**2.** User says: *\"show me anything\
    \ under $20\"*\n\nExpected tool call shape (the agent filters the response\nclient-side;\
    \ no query parameter is supported):\n\n```\nproducts.list()\n// then filter results\
    \ where price < 20\n```\n\n<!-- HUMAN id=\"notes\" -->\n<!-- /HUMAN -->\n"
- id: list-past-orders
  origin: discovered
  name: List past orders
  description: Use when the user wants to see orders they have placed in the past
  user_phrases:
  - show my past orders
  - what did I order
  - my order history
  - did my last order go through
  role: read
  capability_ref: orders
  external: false
  proposed_tool: orders.list
  prose_md: "# List past orders\n\n<!-- AGENT id=\"overview\" -->\nFetch every order\
    \ the acting user has placed previously. The\nresponse is user-scoped server-side\
    \ via the bearer token — the\nagent never supplies a user id. This is a read-only\
    \ retrieval; any\nfiltering by status, date, or amount happens client-side.\n\
    <!-- /AGENT -->\n\n## When to use\n\nThe user is asking about the state of an\
    \ earlier purchase, wants a\nhistory of past activity, or is checking that a recently\
    \ placed\norder was actually accepted. Also called on cart-page mount so the\n\
    \"past orders\" panel can be rendered alongside the current cart.\n\nTrigger phrases:\n\
    - \"show my past orders\"\n- \"what did I order last week\"\n- \"my order history\"\
    \n- \"did my last order go through\"\n\n## Preconditions\n\n1. User is signed\
    \ in (a bearer token is present in client-side storage).\n2. The acting user is\
    \ reading their own history; the server enforces\n   the scope.\n\n## Flows that\
    \ surface this skill\n\n- [checkout](../flows/checkout.md) — surfaced on cart\
    \ mount so the\n  user sees past orders alongside the current cart.\n\n## Failure\
    \ modes\n\n| Result | Meaning | What to do |\n|---|---|---|\n| 401 | Bearer token\
    \ missing or expired | Ask the user to sign in again |\n| 5xx | Backend transient\
    \ failure | Retry once with backoff, then surface |\n| Empty list | User has never\
    \ placed an order | Tell the user no order history exists yet |\n\n## Examples\n\
    \n**1.** User says: *\"did my last order go through?\"*\n\nExpected tool call\
    \ shape (proposed — exact arguments depend on the\nfinal MCP server):\n\n```\n\
    orders.list()\n// then pick the most recent by createdAt and report status\n```\n\
    \n**2.** User says: *\"what have I ordered recently?\"*\n\nExpected tool call\
    \ shape:\n\n```\norders.list()\n// then summarise the N most recent entries\n\
    ```\n\n<!-- HUMAN id=\"notes\" -->\n<!-- /HUMAN -->\n"
- id: place-order
  origin: discovered
  name: Place order
  description: Use when the user wants to purchase the items in their cart
  user_phrases:
  - place the order
  - check out
  - buy these
  - complete my purchase
  role: write
  capability_ref: orders
  external: false
  proposed_tool: orders.create
  prose_md: "# Place order\n\n<!-- AGENT id=\"overview\" -->\nSubmit the user's cart\
    \ to the backend as a new order. The frontend\nsends only `items[]` (product id\
    \ + quantity pairs); the backend\ncomputes `total`, `status`, `createdAt`, and\
    \ assigns the order an\nid. The cart is local to the browser (`localStorage`)\
    \ until this\nskill completes — the agent must treat the local cart as the\nsource\
    \ of truth for the request body.\n<!-- /AGENT -->\n\n## When to use\n\nThe user\
    \ has signalled they want to complete the purchase of the\nitems currently in\
    \ their cart. Before invoking, confirm the cart is\nnon-empty and that the items\
    \ reflect what the user intends to buy.\n\nTrigger phrases:\n- \"place the order\"\
    \n- \"check out\"\n- \"buy these\"\n- \"complete my purchase\"\n\n## Preconditions\n\
    \n1. User is signed in (a bearer token is present in client-side storage).\n2.\
    \ The cart contains at least one item.\n3. Every cart line's `productId` corresponds\
    \ to a product the\n   `list-catalog` skill can resolve.\n\n## Flows that surface\
    \ this skill\n\n- [checkout](../flows/checkout.md) — triggered by the user pressing\n\
    \  \"Place order\" on the cart page.\n\n## Failure modes\n\n| Result | Meaning\
    \ | What to do |\n|---|---|---|\n| 401 | Bearer token missing or expired | Ask\
    \ the user to sign in again |\n| 409 | Stock or pricing conflict on the server\
    \ | Re-run `list-catalog` and tell the user what changed |\n| 422 | Cart payload\
    \ rejected (empty items, bad ids) | Echo the error and ask the user how to fix\
    \ |\n| 5xx | Backend transient failure | Retry once with backoff, then surface\
    \ |\n\n## Examples\n\n**1.** User says: *\"go ahead and place the order\"*\n\n\
    Expected tool call shape (proposed — exact arguments depend on the\nfinal MCP\
    \ server):\n\n```\norders.create({ items: [{ productId: \"p_1\", quantity: 2 }]\
    \ })\n```\n\n**2.** User says: *\"buy two of the blue mug and one of the red one\"\
    *\n\nExpected tool call shape (after resolving names to ids via the\n`list-catalog`\
    \ skill):\n\n```\norders.create({\n  items: [\n    { productId: \"p_blue_mug\"\
    , quantity: 2 },\n    { productId: \"p_red_mug\",  quantity: 1 }\n  ]\n})\n```\n\
    \n<!-- HUMAN id=\"notes\" -->\n<!-- /HUMAN -->\n"
