services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: openbbcd
      POSTGRES_PASSWORD: openbbcd
      POSTGRES_DB: openbbcd
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbbcd -d openbbcd"]
      interval: 5s
      timeout: 5s
      retries: 10

  open-bbcd:
    build:
      context: ./open-bbcd
    image: openbbc/open-bbcd:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://openbbcd:openbbcd@postgres:5432/openbbcd?sslmode=disable
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      DISCOVERY_STORAGE_DIR: /data/discovery
    ports:
      - "8080:8080"
    volumes:
      - discovery-data:/data/discovery
    healthcheck:
      test: ["CMD", "/usr/local/bin/open-bbcd", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 6

  aikdm:
    build:
      context: ./aikdm
    image: openbbc/aikdm:local
    profiles: [aikdm]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./aikdm-work:/work
    working_dir: /work

volumes:
  postgres-data:
  discovery-data:
